<!DOCTYPE html>
<html lang="es-CR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Ruta CR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">Ruta<span class="dot">CR</span></a>
    <nav class="nav-actions">
      <a href="login.html" class="btn btn-ghost">Iniciar sesión</a>
    </nav>
  </div>
</header>

<section class="auth-wrap">
  <div class="lane-line" aria-hidden="true"></div>
  <div class="auth-card">
    <p class="eyebrow">KM 1 — Crear cuenta</p>
    <h1>Registrate</h1>
    <p class="sub">Creá tu cuenta para empezar a practicar el examen teórico.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="registroForm" novalidate>
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" autocomplete="name" required>
      </div>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="provincia">Provincia de residencia</label>
        <select id="provincia" name="provincia" required>
          <option value="" disabled selected>Elegí tu provincia</option>
          <option value="San José">San José</option>
          <option value="Alajuela">Alajuela</option>
          <option value="Cartago">Cartago</option>
          <option value="Heredia">Heredia</option>
          <option value="Guanacaste">Guanacaste</option>
          <option value="Puntarenas">Puntarenas</option>
          <option value="Limón">Limón</option>
        </select>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
        <p class="field-hint">Mínimo 8 caracteres.</p>
      </div>

      <div class="field">
        <label for="password2">Confirmar contraseña</label>
        <input type="password" id="password2" name="password2" autocomplete="new-password" minlength="8" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Crear cuenta</button>
    </form>

    <p class="auth-switch">¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a></p>
  </div>
</section>

<footer class="site-footer">
  <div class="container">RUTA CR · Práctica no oficial para el examen teórico de manejo de Costa Rica</div>
</footer>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
