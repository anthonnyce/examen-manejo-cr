<!DOCTYPE html>
<html lang="es-CR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña — Ruta CR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">Ruta<span class="dot">CR</span></a>
    <nav class="nav-actions">
      <a href="login.html" class="btn btn-ghost">Iniciar sesión</a>
    </nav>
  </div>
</header>

<section class="auth-wrap">
  <div class="lane-line" aria-hidden="true"></div>
  <div class="auth-card">
    <p class="eyebrow">Recuperar acceso</p>
    <h1>¿Olvidaste tu contraseña?</h1>
    <p class="sub">Ingresá tu correo y te enviamos un enlace para restablecerla.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="recuperarForm" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Enviar enlace</button>
    </form>

    <p class="auth-switch">¿Ya lo recordaste? <a href="login.html">Iniciar sesión</a></p>
  </div>
</section>

<footer class="site-footer">
  <div class="container">RUTA CR · Práctica no oficial para el examen teórico de manejo de Costa Rica</div>
</footer>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
