<!DOCTYPE html>
<html lang="es-CR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Ruta CR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">Ruta<span class="dot">CR</span></a>
    <nav class="nav-actions">
      <a href="registro.html" class="btn btn-primary">Registrarse</a>
    </nav>
  </div>
</header>

<section class="auth-wrap">
  <div class="lane-line" aria-hidden="true"></div>
  <div class="auth-card">
    <p class="eyebrow">Bienvenido de vuelta</p>
    <h1>Iniciar sesión</h1>
    <p class="sub">Ingresá para continuar practicando.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <p class="field-hint"><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Entrar</button>
    </form>

    <p class="auth-switch">¿Aún no tenés cuenta? <a href="registro.html">Registrate</a></p>
  </div>
</section>

<footer class="site-footer">
  <div class="container">RUTA CR · Práctica no oficial para el examen teórico de manejo de Costa Rica</div>
</footer>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
